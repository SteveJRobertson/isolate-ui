name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    name: Version, Changelog & Publish
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    permissions:
      id-token: write # Required for npm provenance
      contents: write # Required for pushing commits and tags
      pull-requests: read # Required for GitHub App token

    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.ISOLATE_APP_ID }}
          private-key: ${{ secrets.ISOLATE_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ steps.app-token.outputs.token }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
          registry-url: 'https://registry.npmjs.org'

      - name: Configure Git
        run: |
          git config user.name "isolate-release-bot[bot]"
          git config user.email "isolate-release-bot[bot]@users.noreply.github.com"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify version plans exist
        run: |
          echo "Checking for version plans before release..."

          # Check if there are any version plan files
          if [ ! -d ".nx/version-plans" ] || [ -z "$(ls -A .nx/version-plans/*.md 2>/dev/null)" ]; then
            echo "⚠️  No version plans found. Release will use conventional commits for versioning."
          else
            echo "✓ Version plans found:"
            ls -1 .nx/version-plans/*.md 2>/dev/null || true
          fi

      - name: Configure npm authentication
        run: npm config set //registry.npmjs.org/:_authToken=${NODE_AUTH_TOKEN} --location=user
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Release
        run: pnpm nx release --yes
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_CONFIG_PROVENANCE: true
